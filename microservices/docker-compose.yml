version: '3.8'

services:
  # ===========================================
  # INFRASTRUCTURE
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: gleps_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gleps}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gleps_secret}
      POSTGRES_DB: ${POSTGRES_DB:-gleps_crm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gleps} -d ${POSTGRES_DB:-gleps_crm}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gleps_network

  redis:
    image: redis:7-alpine
    container_name: gleps_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gleps_network

  # ===========================================
  # API GATEWAY
  # ===========================================
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: gleps_gateway
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gleps_network

  # ===========================================
  # MICROSERVICES
  # ===========================================
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: auth-service
    container_name: gleps_auth
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      SERVICE_NAME: auth-service
      DATABASE_URL: postgresql://${POSTGRES_USER:-gleps}:${POSTGRES_PASSWORD:-gleps_secret}@postgres:5432/${POSTGRES_DB:-gleps_crm}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gleps_network

  user-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: user-service
    container_name: gleps_user
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      SERVICE_NAME: user-service
      DATABASE_URL: postgresql://${POSTGRES_USER:-gleps}:${POSTGRES_PASSWORD:-gleps_secret}@postgres:5432/${POSTGRES_DB:-gleps_crm}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gleps_network

  contact-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: contact-service
    container_name: gleps_contact
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3003
      SERVICE_NAME: contact-service
      DATABASE_URL: postgresql://${POSTGRES_USER:-gleps}:${POSTGRES_PASSWORD:-gleps_secret}@postgres:5432/${POSTGRES_DB:-gleps_crm}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gleps_network

  sales-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: sales-service
    container_name: gleps_sales
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3004
      SERVICE_NAME: sales-service
      DATABASE_URL: postgresql://${POSTGRES_USER:-gleps}:${POSTGRES_PASSWORD:-gleps_secret}@postgres:5432/${POSTGRES_DB:-gleps_crm}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gleps_network

  kanban-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: kanban-service
    container_name: gleps_kanban
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3005
      SERVICE_NAME: kanban-service
      DATABASE_URL: postgresql://${POSTGRES_USER:-gleps}:${POSTGRES_PASSWORD:-gleps_secret}@postgres:5432/${POSTGRES_DB:-gleps_crm}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gleps_network

  analytics-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: analytics-service
    container_name: gleps_analytics
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3006
      SERVICE_NAME: analytics-service
      DATABASE_URL: postgresql://${POSTGRES_USER:-gleps}:${POSTGRES_PASSWORD:-gleps_secret}@postgres:5432/${POSTGRES_DB:-gleps_crm}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gleps_network

  calendar-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: calendar-service
    container_name: gleps_calendar
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3007
      SERVICE_NAME: calendar-service
      DATABASE_URL: postgresql://${POSTGRES_USER:-gleps}:${POSTGRES_PASSWORD:-gleps_secret}@postgres:5432/${POSTGRES_DB:-gleps_crm}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gleps_network

  event-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: event-service
    container_name: gleps_event
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3008
      SERVICE_NAME: event-service
      DATABASE_URL: postgresql://${POSTGRES_USER:-gleps}:${POSTGRES_PASSWORD:-gleps_secret}@postgres:5432/${POSTGRES_DB:-gleps_crm}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gleps_network

  # ===========================================
  # FRONTEND
  # ===========================================
  frontend:
    build:
      context: ..
      dockerfile: Dockerfile.frontend
    container_name: gleps_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - gateway
    networks:
      - gleps_network

networks:
  gleps_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
